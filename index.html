<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Averating</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset.css">
</head>
<body>
    <main>
        <section id="home" class="container">
            <h1 class="title">Choose a grading method</h1>

            <section class="reviews">
                <button class="btn_default">Default</button>
                <button class="btn_advanced">Advanced</button>
            </section>      
        </section>

        <section id="default-page" class="hidden">
            <h1>Default Rating</h1>

            <input type="number" placeholder="Animation">
            <input type="number" placeholder="Story">
            <input type="number" placeholder="Characters">
            <input type="number" placeholder="Ambient">
            <input type="number" placeholder="Climax">

            <button>Calculate</button>
        </section>

        <section id="advanced-page" class="hidden">
            <h1>Advanced Rating</h1>

            <input type="number" placeholder="">
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
