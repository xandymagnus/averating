<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Averating</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset.css">
</head>
<body>
    <main>
        <!-- HOME PAGE -->
        <section id="home" class="container">
            <h1 class="title">Choose a grading method</h1>

            <section class="reviews">
                <button class="btn-default">Default</button>
                <button class="btn-advanced">Advanced</button>
            </section>      
        </section>

        <!-- DEFAULT PAGE -->
        <section id="default-page" class="hidden">
            <h1>Default Rating</h1>

            <form id="form">
                <input type="number" min="1" step="any" max="10" placeholder="Animation" class="input-categories" required>
                <input type="number" min="1" step="any" max="10"  placeholder="Story" class="input-categories" required>
                <input type="number" min="1" step="any" max="10"  placeholder="Characters" class="input-categories" required>
                <input type="number" min="1" step="any" max="10"  placeholder="Ambient" class="input-categories" required>
                <input type="number" min="1" step="any" max="10"  placeholder="Climax" class="input-categories" required>
    
                <button class="btn-back" type="click">Back</button>
                <button class="btn-calculate" type="submit">Calculate</button>
            </form>
            <p class="result"></p>
        </section>

        <!-- ADVANCED PAGE -->
        <section id="advanced-page" class="hidden">
            <h1>Advanced Rating</h1>

            <input type="number" placeholder="Animation">

            <button class="btn-back" type="click">Back</button>
            <button class="btn-calculate">Calculate</button>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
